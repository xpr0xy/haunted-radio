<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haunted Radio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Special+Elite&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #c4a265;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  #scanlines {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    mix-blend-mode: multiply;
  }

  #grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    opacity: 0.04;
    animation: grain 0.5s steps(6) infinite;
  }

  @keyframes grain {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5%, -10%); }
    20% { transform: translate(-15%, 5%); }
    30% { transform: translate(7%, -25%); }
    40% { transform: translate(-5%, 25%); }
    50% { transform: translate(-15%, 10%); }
    60% { transform: translate(15%, 0%); }
    70% { transform: translate(0%, 15%); }
    80% { transform: translate(3%, 35%); }
    90% { transform: translate(-10%, 10%); }
  }

  .container {
    position: relative;
    width: 90vw;
    max-width: 900px;
    z-index: 10;
  }

  .header {
    text-align: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
  }

  .header h1 {
    font-family: 'Special Elite', cursive;
    font-size: 2.8em;
    color: #c4a265;
    text-shadow: 0 0 40px rgba(196, 162, 101, 0.3);
    letter-spacing: 8px;
    text-transform: uppercase;
  }

  .header .subtitle {
    font-size: 0.7em;
    color: #5a4a2f;
    margin-top: 5px;
    letter-spacing: 4px;
  }

  .dial-container {
    position: relative;
    width: 100%;
    height: 200px;
    margin: 20px 0;
  }

  #dialCanvas {
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  #dialCanvas:active { cursor: grabbing; }

  .station-display {
    text-align: center;
    margin: 20px 0;
    min-height: 80px;
  }

  .station-name {
    font-family: 'Special Elite', cursive;
    font-size: 1.4em;
    color: #e8d5a3;
    text-shadow: 0 0 20px rgba(232, 213, 163, 0.2);
    transition: all 0.3s;
  }

  .station-meta {
    font-size: 0.75em;
    color: #5a4a2f;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .station-unknown {
    color: #3a3a2a;
    font-style: italic;
  }

  .fx-panel {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 25px 0;
    flex-wrap: wrap;
  }

  .fx-knob {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.5;
    transition: opacity 0.3s;
  }

  .fx-knob.active { opacity: 1; }

  .fx-knob .label {
    font-size: 0.6em;
    color: #5a4a2f;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .fx-knob .value {
    font-size: 0.9em;
    color: #c4a265;
    min-width: 30px;
    text-align: center;
  }

  .fx-knob input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 3px;
    background: #2a2a1a;
    border-radius: 2px;
    outline: none;
  }

  .fx-knob input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #c4a265;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(196, 162, 101, 0.4);
  }

  .power-section {
    text-align: center;
    margin-top: 30px;
  }

  .power-btn {
    font-family: 'Special Elite', cursive;
    font-size: 1.1em;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: none;
    border: 1px solid #3a3a2a;
    color: #5a4a2f;
    padding: 12px 40px;
    cursor: pointer;
    transition: all 0.5s;
    position: relative;
    overflow: hidden;
  }

  .power-btn:hover {
    border-color: #c4a265;
    color: #c4a265;
    box-shadow: 0 0 30px rgba(196, 162, 101, 0.1);
  }

  .power-btn.on {
    border-color: #c4a265;
    color: #e8d5a3;
    box-shadow: 0 0 40px rgba(196, 162, 101, 0.15);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(196, 162, 101, 0.15); }
    50% { box-shadow: 0 0 60px rgba(196, 162, 101, 0.25); }
  }

  .status-bar {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.65em;
    color: #2a2a1a;
    letter-spacing: 3px;
    z-index: 10;
  }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.8em; letter-spacing: 4px; }
    .fx-knob input[type="range"] { width: 60px; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="scanlines"></div>
<div id="grain"></div>

<div class="container">
  <div class="header">
    <h1>Haunted Radio</h1>
    <div class="subtitle">tuning the dead frequencies</div>
  </div>

  <div class="dial-container">
    <canvas id="dialCanvas"></canvas>
  </div>

  <div class="station-display">
    <div class="station-name" id="stationName">
      <span class="station-unknown">— silence —</span>
    </div>
    <div class="station-meta" id="stationMeta"></div>
  </div>

  <div class="fx-panel">
    <div class="fx-knob" id="fxDecay">
      <span class="label">decay</span>
      <input type="range" min="0" max="100" value="30" id="decaySlider">
      <span class="value" id="decayVal">30</span>
    </div>
    <div class="fx-knob" id="fxWobble">
      <span class="label">wobble</span>
      <input type="range" min="0" max="100" value="40" id="wobbleSlider">
      <span class="value" id="wobbleVal">40</span>
    </div>
    <div class="fx-knob" id="fxSaturation">
      <span class="label">dirt</span>
      <input type="range" min="0" max="100" value="25" id="satSlider">
      <span class="value" id="satVal">25</span>
    </div>
    <div class="fx-knob" id="fxReverb">
      <span class="label">void</span>
      <input type="range" min="0" max="100" value="50" id="reverbSlider">
      <span class="value" id="reverbVal">50</span>
    </div>
    <div class="fx-knob" id="fxStatic">
      <span class="label">static</span>
      <input type="range" min="0" max="100" value="20" id="staticSlider">
      <span class="value" id="staticVal">20</span>
    </div>
  </div>

  <div class="power-section">
    <button class="power-btn" id="powerBtn">tune in</button>
  </div>
</div>

<div class="status-bar" id="statusBar">scroll or drag to tune • space to power</div>

<script>
// ─── CORS proxy for audio streams ──────────────────────────────
const CORS_PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// ─── State ──────────────────────────────────────────────────────
const state = {
  powered: false,
  stations: [],
  currentStation: null,
  stationIndex: 0,
  dialPosition: 0,
  audioCtx: null,
  nodes: {},
  loading: true,
  dragging: false,
  useProcessing: true,
};

// ─── DOM refs ───────────────────────────────────────────────────
const canvas = document.getElementById('dialCanvas');
const ctx = canvas.getContext('2d');
const powerBtn = document.getElementById('powerBtn');
const stationName = document.getElementById('stationName');
const stationMeta = document.getElementById('stationMeta');
const statusBar = document.getElementById('statusBar');

const sliders = {
  decay: document.getElementById('decaySlider'),
  wobble: document.getElementById('wobbleSlider'),
  saturation: document.getElementById('satSlider'),
  reverb: document.getElementById('reverbSlider'),
  static: document.getElementById('staticSlider'),
};

// ─── Grain texture ──────────────────────────────────────────────
(function initGrain() {
  const gc = document.createElement('canvas');
  gc.width = 256; gc.height = 256;
  const gctx = gc.getContext('2d');
  const imgData = gctx.createImageData(256, 256);
  for (let i = 0; i < imgData.data.length; i += 4) {
    const v = Math.random() * 255;
    imgData.data[i] = imgData.data[i+1] = imgData.data[i+2] = v;
    imgData.data[i+3] = 255;
  }
  gctx.putImageData(imgData, 0, 0);
  document.getElementById('grain').style.backgroundImage = `url(${gc.toDataURL()})`;
})();

// ─── Canvas setup ───────────────────────────────────────────────
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ─── Fetch stations (direct from radio-browser.info) ────────────
async function loadStations() {
  statusBar.textContent = 'scanning frequencies...';
  const apiUrls = [
    'https://de1.api.radio-browser.info',
    'https://nl1.api.radio-browser.info',
    'https://at1.api.radio-browser.info',
  ];

  for (const base of apiUrls) {
    try {
      const url = `${base}/json/stations/search?limit=200&order=clickcount&reverse=true&hidebroken=true&has_https_failover=true`;
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      if (!res.ok) continue;
      const data = await res.json();
      state.stations = data
        .filter(s => s.url_resolved || s.url)
        .map((s, i) => ({
          name: s.name || 'Unknown Station',
          url: s.url_resolved || s.url,
          country: s.country || '',
          tags: s.tags || '',
          codec: s.codec || '',
          bitrate: s.bitrate || '',
          index: i,
        }))
        .sort(() => Math.random() - 0.5);

      state.loading = false;
      statusBar.textContent = `${state.stations.length} signals found • scroll or drag to tune • space to power`;
      drawDial();
      return;
    } catch (e) {
      continue;
    }
  }
  statusBar.textContent = 'signal lost — refresh to rescan';
}

// ─── Audio engine ───────────────────────────────────────────────
function initAudio() {
  if (state.audioCtx) return;
  state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function createProcessingChain() {
  const ctx = state.audioCtx;
  const n = state.nodes;

  n.masterGain = ctx.createGain();
  n.masterGain.gain.value = 0;
  n.inputGain = ctx.createGain();
  n.inputGain.gain.value = 0.8;

  n.bpFilter = ctx.createBiquadFilter();
  n.bpFilter.type = 'bandpass';
  n.bpFilter.frequency.value = 1000;
  n.bpFilter.Q.value = 0.5;

  n.lowCut = ctx.createBiquadFilter();
  n.lowCut.type = 'highpass';
  n.lowCut.frequency.value = 80;

  n.delay = ctx.createDelay(1.0);
  n.delay.delayTime.value = 0.1;
  n.delayFeedback = ctx.createGain();
  n.delayFeedback.gain.value = 0.15;
  n.delayWet = ctx.createGain();
  n.delayWet.gain.value = 0.4;
  n.dry = ctx.createGain();
  n.dry.gain.value = 0.7;

  n.waveshaper = ctx.createWaveShaper();
  n.waveshaper.curve = makeSaturationCurve(50);
  n.waveshaper.oversample = '4x';

  n.postGain = ctx.createGain();
  n.postGain.gain.value = 0.9;

  n.convolver = ctx.createConvolver();
  n.convolver.buffer = createReverbImpulse(ctx, 3.5, 2.5);

  n.reverbWet = ctx.createGain();
  n.reverbWet.gain.value = 0.5;
  n.reverbDry = ctx.createGain();
  n.reverbDry.gain.value = 0.7;

  n.staticGain = ctx.createGain();
  n.staticGain.gain.value = 0.08;
  n.staticSource = createStaticNoise(ctx);
  n.staticSource.connect(n.staticGain);
  n.staticGain.connect(n.masterGain);

  n.bpLfo = ctx.createOscillator();
  n.bpLfo.type = 'sine';
  n.bpLfo.frequency.value = 0.08;
  n.bpLfoGain = ctx.createGain();
  n.bpLfoGain.gain.value = 200;
  n.bpLfo.connect(n.bpLfoGain);
  n.bpLfoGain.connect(n.bpFilter.frequency);
  n.bpLfo.start();

  n.wobbleLfo = ctx.createOscillator();
  n.wobbleLfo.type = 'sine';
  n.wobbleLfo.frequency.value = 0.3;
  n.wobbleLfoGain = ctx.createGain();
  n.wobbleLfoGain.gain.value = 0.002;
  n.wobbleLfo.connect(n.wobbleLfoGain);
  n.wobbleLfoGain.connect(n.delay.delayTime);
  n.wobbleLfo.start();

  n.flutterLfo = ctx.createOscillator();
  n.flutterLfo.type = 'sawtooth';
  n.flutterLfo.frequency.value = 4.5;
  n.flutterLfoGain = ctx.createGain();
  n.flutterLfoGain.gain.value = 0.0005;
  n.flutterLfo.connect(n.flutterLfoGain);
  n.flutterLfoGain.connect(n.delay.delayTime);
  n.flutterLfo.start();

  n.inputGain.connect(n.lowCut);
  n.lowCut.connect(n.bpFilter);
  n.bpFilter.connect(n.dry);
  n.bpFilter.connect(n.delay);
  n.delay.connect(n.delayFeedback);
  n.delayFeedback.connect(n.delay);
  n.delay.connect(n.delayWet);
  n.dry.connect(n.waveshaper);
  n.delayWet.connect(n.waveshaper);
  n.waveshaper.connect(n.postGain);
  n.postGain.connect(n.convolver);
  n.postGain.connect(n.reverbDry);
  n.convolver.connect(n.reverbWet);
  n.reverbWet.connect(n.masterGain);
  n.reverbDry.connect(n.masterGain);
  n.masterGain.connect(ctx.destination);
}

function makeSaturationCurve(amount) {
  const samples = 44100;
  const curve = new Float32Array(samples);
  const k = amount / 100;
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
  }
  return curve;
}

function createReverbImpulse(ctx, duration, decay) {
  const length = ctx.sampleRate * duration;
  const impulse = ctx.createBuffer(2, length, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const data = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}

function createStaticNoise(ctx) {
  const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  src.start();
  return src;
}

// ─── Stream loading with CORS proxy fallback ────────────────────
let currentAudioEl = null;
let currentSourceNode = null;

async function tryFetchStream(url) {
  // try direct first
  try {
    const res = await fetch(url, { mode: 'cors', signal: AbortSignal.timeout(3000) });
    if (res.ok) return url;
  } catch {}

  // try CORS proxies
  for (const makeProxyUrl of CORS_PROXIES) {
    try {
      const proxyUrl = makeProxyUrl(url);
      const res = await fetch(proxyUrl, { mode: 'cors', signal: AbortSignal.timeout(5000) });
      if (res.ok) return proxyUrl;
    } catch {}
  }
  return null;
}

async function loadStation(station) {
  const ctx = state.audioCtx;

  // Kill old stream
  if (currentAudioEl) { currentAudioEl.pause(); currentAudioEl.src = ''; currentAudioEl.remove(); }
  if (currentSourceNode) { try { currentSourceNode.disconnect(); } catch {} }

  state.currentStation = station;
  updateStationDisplay(station);

  // Try to get a CORS-accessible URL for processing
  const processedUrl = await tryFetchStream(station.url);

  if (processedUrl && state.useProcessing) {
    // Full processing chain
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.preload = 'none';
    audio.src = processedUrl;
    currentAudioEl = audio;
    currentSourceNode = ctx.createMediaElementSource(audio);
    currentSourceNode.connect(state.nodes.inputGain);
    audio.play().catch(() => {});
  } else {
    // Fallback: plain audio without processing
    state.useProcessing = false;
    const audio = new Audio();
    audio.crossOrigin = 'anonymous';
    audio.preload = 'none';
    audio.src = station.url;
    currentAudioEl = audio;
    audio.play().catch(() => {});
    statusBar.textContent = 'raw signal — processing unavailable for this stream';
  }
}

function killStream() {
  if (currentAudioEl) { currentAudioEl.pause(); currentAudioEl.src = ''; currentAudioEl.remove(); currentAudioEl = null; }
  if (currentSourceNode) { try { currentSourceNode.disconnect(); } catch {} currentSourceNode = null; }
  state.currentStation = null;
}

// ─── FX updates ─────────────────────────────────────────────────
function updateFX() {
  const n = state.nodes;
  if (!n.delay) return;
  const d = sliders.decay.value / 100;
  const w = sliders.wobble.value / 100;
  const s = sliders.saturation.value / 100;
  const r = sliders.reverb.value / 100;
  const st = sliders.static.value / 100;
  const t = state.audioCtx.currentTime;

  n.delayFeedback.gain.setTargetAtTime(d * 0.4, t, 0.1);
  n.delayWet.gain.setTargetAtTime(0.2 + d * 0.6, t, 0.1);
  n.wobbleLfoGain.gain.setTargetAtTime(w * 0.004, t, 0.1);
  n.flutterLfoGain.gain.setTargetAtTime(w * 0.001, t, 0.1);
  n.waveshaper.curve = makeSaturationCurve(10 + s * 200);
  n.reverbWet.gain.setTargetAtTime(r * 0.7, t, 0.1);
  n.reverbDry.gain.setTargetAtTime(1 - r * 0.3, t, 0.1);
  n.staticGain.gain.setTargetAtTime(st * 0.15, t, 0.1);
}

Object.values(sliders).forEach(sl => {
  sl.addEventListener('input', () => {
    sl.parentElement.querySelector('.value').textContent = sl.value;
    updateFX();
  });
});

// ─── Dial rendering ─────────────────────────────────────────────
function drawDial() {
  const w = canvas.width / window.devicePixelRatio;
  const h = canvas.height / window.devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  const cx = w / 2, cy = h * 0.65;
  const r = Math.min(w * 0.4, h * 0.7);

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0, false);
  ctx.strokeStyle = '#2a2a1a'; ctx.lineWidth = 3; ctx.stroke();

  const ticks = state.stations.length > 0 ? Math.min(state.stations.length, 80) : 40;
  for (let i = 0; i <= ticks; i++) {
    const a = Math.PI + (i / ticks) * Math.PI;
    const major = i % 5 === 0;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * (r - (major ? 25 : 15)), cy + Math.sin(a) * (r - (major ? 25 : 15)));
    ctx.lineTo(cx + Math.cos(a) * (r + 5), cy + Math.sin(a) * (r + 5));
    ctx.strokeStyle = major ? '#5a4a2f' : '#2a2a1a';
    ctx.lineWidth = major ? 2 : 1; ctx.stroke();

    if (major && state.stations.length > 0) {
      const si = Math.floor((i / ticks) * state.stations.length);
      if (state.stations[si]) {
        ctx.save(); ctx.font = '9px "JetBrains Mono"';
        ctx.fillStyle = '#3a3a2a'; ctx.textAlign = 'center';
        const lr = r + 18;
        ctx.fillText(state.stations[si].country?.substring(0, 3).toUpperCase() || '',
          cx + Math.cos(a) * lr, cy + Math.sin(a) * lr);
        ctx.restore();
      }
    }
  }

  const pa = Math.PI + state.dialPosition * Math.PI;
  // glow
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(pa) * (r + 10), cy + Math.sin(pa) * (r + 10));
  ctx.strokeStyle = 'rgba(196, 162, 101, 0.15)'; ctx.lineWidth = 8; ctx.stroke();
  // needle
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.lineTo(cx + Math.cos(pa) * (r - 35), cy + Math.sin(pa) * (r - 35));
  ctx.strokeStyle = state.powered ? '#c4a265' : '#3a3a2a'; ctx.lineWidth = 2; ctx.stroke();
  // center dot
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = state.powered ? '#c4a265' : '#2a2a1a'; ctx.fill();

  // freq text
  ctx.font = '11px "JetBrains Mono"'; ctx.fillStyle = '#3a3a2a'; ctx.textAlign = 'center';
  ctx.fillText(`${(87.5 + state.dialPosition * 20.5).toFixed(1)} MHz`, cx, cy + 25);

  // shimmer
  if (state.powered && state.currentStation) {
    const tx = cx + Math.cos(pa) * (r - 35), ty = cy + Math.sin(pa) * (r - 35);
    for (let i = 0; i < 5; i++) {
      ctx.beginPath();
      ctx.arc(tx + (Math.random() - 0.5) * 10, ty + (Math.random() - 0.5) * 10, 1, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(196,162,101,${Math.random() * 0.3})`; ctx.fill();
    }
  }
}

// ─── Dial interaction ───────────────────────────────────────────
function handleDial(clientX) {
  const rect = canvas.getBoundingClientRect();
  state.dialPosition = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  if (state.powered && state.stations.length > 0) {
    const idx = Math.floor(state.dialPosition * (state.stations.length - 1));
    if (idx !== state.stationIndex) { state.stationIndex = idx; loadStation(state.stations[idx]); }
  }
  drawDial();
}

canvas.addEventListener('mousedown', e => { state.dragging = true; handleDial(e.clientX); });
window.addEventListener('mousemove', e => { if (state.dragging) handleDial(e.clientX); });
window.addEventListener('mouseup', () => { state.dragging = false; });
canvas.addEventListener('touchstart', e => { state.dragging = true; handleDial(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
window.addEventListener('touchmove', e => { if (state.dragging) handleDial(e.touches[0].clientX); }, { passive: false });
window.addEventListener('touchend', () => { state.dragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  state.dialPosition = Math.max(0, Math.min(1, state.dialPosition + (e.deltaY > 0 ? 0.008 : -0.008)));
  if (state.powered && state.stations.length > 0) {
    const idx = Math.floor(state.dialPosition * (state.stations.length - 1));
    if (idx !== state.stationIndex) { state.stationIndex = idx; loadStation(state.stations[idx]); }
  }
  drawDial();
}, { passive: false });

// ─── Power ──────────────────────────────────────────────────────
powerBtn.addEventListener('click', togglePower);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePower(); }
  if (!state.powered) return;
  if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
    state.dialPosition = Math.min(1, state.dialPosition + 0.01);
    const idx = Math.floor(state.dialPosition * (state.stations.length - 1));
    if (idx !== state.stationIndex) { state.stationIndex = idx; loadStation(state.stations[idx]); }
    drawDial();
  }
  if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
    state.dialPosition = Math.max(0, state.dialPosition - 0.01);
    const idx = Math.floor(state.dialPosition * (state.stations.length - 1));
    if (idx !== state.stationIndex) { state.stationIndex = idx; loadStation(state.stations[idx]); }
    drawDial();
  }
});

async function togglePower() {
  if (state.loading) return;
  state.powered = !state.powered;
  powerBtn.classList.toggle('on', state.powered);
  powerBtn.textContent = state.powered ? 'broadcasting' : 'tune in';

  if (state.powered) {
    initAudio();
    createProcessingChain();
    updateFX();
    state.nodes.masterGain.gain.setTargetAtTime(0.7, state.audioCtx.currentTime, 0.5);
    if (state.stations.length > 0) {
      const idx = Math.floor(state.dialPosition * (state.stations.length - 1));
      state.stationIndex = idx;
      loadStation(state.stations[idx]);
    }
    statusBar.textContent = 'broadcasting • scroll or drag to tune';
  } else {
    if (state.nodes.masterGain) state.nodes.masterGain.gain.setTargetAtTime(0, state.audioCtx.currentTime, 0.3);
    killStream();
    updateStationDisplay(null);
    statusBar.textContent = 'off air • space to power';
  }
  drawDial();
}

function updateStationDisplay(station) {
  if (!station) { stationName.innerHTML = '<span class="station-unknown">— silence —</span>'; stationMeta.textContent = ''; return; }
  stationName.style.opacity = '0';
  setTimeout(() => {
    stationName.textContent = station.name;
    stationName.style.opacity = '1';
    const parts = [];
    if (station.country) parts.push(station.country);
    if (station.codec) parts.push(station.codec);
    if (station.bitrate) parts.push(`${station.bitrate}kbps`);
    stationMeta.textContent = parts.join(' • ');
  }, 150);
}

// ─── Animation ──────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  if (state.powered && !state.dragging && Math.random() < 0.01) {
    state.dialPosition = Math.max(0, Math.min(1, state.dialPosition + (Math.random() - 0.5) * 0.001));
    drawDial();
  }
  if (state.powered) drawDial();
}

loadStations();
drawDial();
animate();
</script>
</body>
</html>
